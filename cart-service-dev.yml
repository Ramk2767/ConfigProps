server:
  port: 8881

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/cart_db
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
management:
  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
